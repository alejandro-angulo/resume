name: "Build"
on: [pull_request, push]
jobs:
  pre-commit-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31.10.2
      - uses: cachix/cachix-action@v17
        with:
          name: devenv
      - uses: cachix/cachix-action@v17
        with:
          name: alejandr0angul0-resume
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Run pre-commit hooks
        run: |
          git fetch origin
          nix develop --accept-flake-config --impure --command bash -c \
            "prek run --from-ref origin/main --to-ref $GITHUB_SHA"

  build:
    needs: pre-commit-hooks
    strategy:
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31.10.2
      - uses: cachix/cachix-action@v17
        with:
          name: devenv
      - uses: cachix/cachix-action@v17
        with:
          name: alejandr0angul0-resume
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build --accept-flake-config
      - run: nix flake check --impure --accept-flake-config
      - run: nix run --accept-flake-config
